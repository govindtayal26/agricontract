{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Crop - AgriContract</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body style="background-color: #f4f7f6; padding: 50px;">

    <div style="max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="color: #15803d; margin-bottom: 20px;">List Your Produce</h2>
        
        <form method="POST" enctype="multipart/form-data"> {% csrf_token %}
            
            <div class="form-container">
                {{ form.as_p }}
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 20px; cursor: pointer;">
                Post Crop Listing
            </button>
        </form>
        
        <p style="margin-top: 15px;"><a href="{% url 'home' %}" style="color: #666;">← Back to Marketplace</a></p>
    </div>

</body>
</html>
