<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
</head>
<body style="font-family: Arial; padding: 20px;">

<h2>Chat for {{ contract.crop.name }}</h2>

<div style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:scroll;">
    {% for msg in messages %}
        <p>
            <strong>{{ msg.sender.username }}:</strong> 
            {{ msg.text }}
        </p>
    {% empty %}
        <p>No messages yet</p>
    {% endfor %}
</div>

<br>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="text" placeholder="Type message..." style="width:80%;" required>
    <button type="submit">Send</button>
</form>

</body>
</html>
